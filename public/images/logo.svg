<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B8FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape with cross -->
  <path d="M 20 15 L 35 15 L 35 35 Q 35 50 27.5 60 Q 20 50 20 35 Z" fill="url(#shieldGradient)" />
  
  <!-- White cross in shield -->
  <rect x="25" y="22" width="3" height="22" fill="white" />
  <rect x="19" y="28" width="15" height="3" fill="white" />
  
  <!-- Text -->
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1976D2">
    Assam
  </text>
  <text x="45" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1976D2">
    Health Card
  </text>
</svg>
